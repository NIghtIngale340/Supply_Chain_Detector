rules:
  - id: credential-harvesting-env
    message: >-
      Access to known credential environment variables — potential
      credential harvesting for exfiltration.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      technology: [python]
      cwe: ["CWE-522: Insufficiently Protected Credentials"]
    pattern-either:
      - pattern: os.environ.get("AWS_SECRET_ACCESS_KEY", ...)
      - pattern: os.environ.get("AWS_ACCESS_KEY_ID", ...)
      - pattern: os.environ.get("GITHUB_TOKEN", ...)
      - pattern: os.environ.get("NPM_TOKEN", ...)
      - pattern: os.environ.get("PYPI_TOKEN", ...)
      - pattern: os.getenv("AWS_SECRET_ACCESS_KEY")
      - pattern: os.getenv("AWS_ACCESS_KEY_ID")
      - pattern: os.getenv("GITHUB_TOKEN")

  - id: credential-file-read
    message: >-
      Reading sensitive credential files such as AWS config or SSH keys.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: ["CWE-522: Insufficiently Protected Credentials"]
    pattern-either:
      - pattern: open("~/.aws/credentials", ...)
      - pattern: open("~/.ssh/id_rsa", ...)
      - pattern: open("~/.ssh/id_ed25519", ...)

  - id: credential-exfiltration
    message: >-
      Environment variable value sent via HTTP POST — potential credential
      exfiltration.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: ["CWE-200: Information Exposure"]
    patterns:
      - pattern-either:
          - pattern: |
              $VAL = os.environ.get(...)
              ...
              requests.post(..., data=$VAL, ...)
          - pattern: |
              $VAL = os.getenv(...)
              ...
              requests.post(..., data=$VAL, ...)
